# ─────────────────────────────────────────────────────────────────────────────
# CyberSec AI — Full Stack
#
# Services:
#   ollama       — Local LLM server
#   ollama-init  — One-shot model puller (runs automatically, exits when done)
#   etcd         — Milvus metadata store
#   minio        — Milvus object storage
#   milvus       — Vector + scalar database
#   app          — FastAPI backend + Streamlit UI
#
# All ports and service URLs are configurable via .env
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Ollama ─────────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: cybersec-ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s
    networks:
      - cybersec-net

  # Pulls required models on every `docker compose up`.
  # Safe to re-run — `ollama pull` is a no-op if the model is already present.
  # Exits with code 0 when done; restart:no ensures it doesn't loop.
  ollama-init:
    image: ollama/ollama:latest
    container_name: cybersec-ollama-init
    restart: "no"
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: >
      /bin/sh -c "
        echo 'Pulling ${SUPERVISOR_MODEL:-ministral-3:8b} ...' &&
        ollama pull ${SUPERVISOR_MODEL:-ministral-3:8b} &&
        echo 'Pulling ${EMBED_MODEL:-nomic-embed-text} ...' &&
        ollama pull ${EMBED_MODEL:-nomic-embed-text} &&
        echo 'All models ready.'
      "
    environment:
      - OLLAMA_HOST=http://ollama:${OLLAMA_PORT:-11434}
    networks:
      - cybersec-net

  # ── Milvus stack ───────────────────────────────────────────────────────────
  etcd:
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.5.25
    restart: unless-stopped
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: etcd
      -advertise-client-urls=http://etcd:2379
      -listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - cybersec-net

  minio:
    container_name: milvus-minio
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    restart: unless-stopped
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - cybersec-net

  milvus:
    container_name: milvus-standalone
    image: milvusdb/milvus:v2.6.15
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MQ_TYPE: woodpecker
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "${MILVUS_PORT:-19530}:19530"
      - "${MILVUS_METRICS_PORT:-9091}:9091"
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    networks:
      - cybersec-net

  # ── Application ────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cybersec-app
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
      - "${UI_PORT:-8501}:8501"
    env_file:
      - .env
    environment:
      OLLAMA_URL: http://ollama:${OLLAMA_PORT:-11434}
      MILVUS_URI: http://milvus:${MILVUS_PORT:-19530}
      API_URL:    http://app:${API_PORT:-8000}
    depends_on:
      ollama:
        condition: service_healthy
      milvus:
        condition: service_healthy
    networks:
      - cybersec-net

# ── Named volumes ──────────────────────────────────────────────────────────────
volumes:
  ollama_data:
  etcd_data:
  minio_data:
  milvus_data:

# ── Network ────────────────────────────────────────────────────────────────────
networks:
  cybersec-net:
    driver: bridge
